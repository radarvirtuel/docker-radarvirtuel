# ─────────────────────────────────────────────────────────────
# docker-compose.yml — docker-radarvirtuel v2
# Version     : v1.3 — 2026-06-08
# ─────────────────────────────────────────────────────────────
# SETUP:
#   1. cp env.example .env && nano .env
#   2. docker compose up -d
#   3. docker logs -f radarvirtuel
# ─────────────────────────────────────────────────────────────

services:
  radarvirtuel:
    image: ghcr.io/radarvirtuel/docker-radarvirtuel:latest
    container_name: radarvirtuel
    hostname: radarvirtuel
    restart: unless-stopped

    environment:
      # ── Station UID (optionnel) ───────────────────────────
      # Laissez vide : lu depuis CPU serial ou généré automatiquement
      - RV_STATION_UID=${RV_STATION_UID:-}

      # ── Position (obligatoire si mlat-client non monté) ───
      - RV_LAT=${FEEDER_LAT:-}
      - RV_LON=${FEEDER_LONG:-}
      - RV_ALT_M=${FEEDER_ALT_M:-0}

      # ── Label station (optionnel) ─────────────────────────
      # Laissez vide : détecté depuis l'aéroport le plus proche
      - RV_STATION_LABEL=${RV_STATION_LABEL:-}

      # ── Contributeur (optionnel) ──────────────────────────
      - RV_CONTRIB_NAME=${RV_CONTRIB_NAME:-}
      - RV_CONTRIB_EMAIL=${RV_CONTRIB_EMAIL:-}

      # ── Source Beast ──────────────────────────────────────
      # ultrafeeder dans le même stack : SOURCE_HOST=ultrafeeder:30005
      # readsb standalone même machine  : SOURCE_HOST=192.168.1.x:30005
      - SOURCE_HOST=${SOURCE_HOST:-localhost:30005}

    volumes:
      # UID persistant entre mises à jour
      - radarvirtuel_data:/data
      # CPU serial du host pour station_uid
      - /proc/cpuinfo:/host/cpuinfo:ro
      # mlat-client pour lat/lon automatiques (optionnel)
      - /etc/default/mlat-client:/etc/default/mlat-client:ro
      # Timezone
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,relatime,size=32M

volumes:
  radarvirtuel_data:
    driver: local
